services:
  db:
    image: postgres:16-alpine
    container_name: brassfoot-db
    environment:
      POSTGRES_USER: brassfoot
      POSTGRES_PASSWORD: brassfoot
      POSTGRES_DB: brassfoot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brassfoot"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
