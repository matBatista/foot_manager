# Fly.io configuration for Brassfoot API
# Run `fly deploy` from the repo root.

app            = "brassfoot-api"
primary_region = "gru"        # São Paulo — closest to Brazil

[build]
  dockerfile = "Dockerfile"   # root-level, context = repo root

[env]
  PORT = "8080"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = true
  auto_start_machines  = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "256mb"
